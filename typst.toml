[package]
name = "pivot"
version = "0.1.0"
entrypoint = "lib.typ"
authors = ["cybermallard <cybermallard@ttp.dev>"]
license = "Apache-2.0"
description = "Cyber Threat Intelligence (CTI) diagrams for Typst"

# Required before publishing to @preview — fill in the real URLs:
# homepage = "https://github.com/cybermallard/typst-pivot"
# repository = "https://github.com/cybermallard/typst-pivot"

keywords = ["cti", "security", "packet", "diagram", "cetz"]
categories = ["visualization"]
disciplines = ["computer-science"]

# Minimum Typst version. CeTZ 0.5.2 requires >= 0.14.0, and the test runner
# tytanic 0.3.4 embeds Typst 0.14.2 (it compiles the visual-regression
# references), so the toolchain is pinned to 0.14.x. Floor is 0.14.0; CI pins
# Typst 0.14.2 to match tytanic. (Revisit when a tytanic on Typst 0.15 ships.)
compiler = "0.14.0"

# Keep the published bundle lean. Never exclude README/LICENSE/NOTICE.
# manual.pdf is a GitHub release asset, not bundle weight.
exclude = [
  "tests",
  "examples",
  "docs",
  ".github",
  "scripts",
]
